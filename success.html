<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Status</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        /* Make navbar sticky and apply glass effect */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 1050;
            background-color: rgba(33, 37, 41, 0.85); /* Semi-transparent dark */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px); /* For Safari */
        }
        .progress-container {
            display: flex;
            justify-content: space-between;
            list-style: none;
            padding: 0;
            margin: 2rem 0 3rem 0;
            position: relative;
        }
        .progress-container::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            height: 4px;
            width: 100%;
            background-color: #e0e0e0;
            z-index: -1;
        }
        .progress-line {
            position: absolute;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            height: 4px;
            background-color: #0D6EFD;
            z-index: -1;
            transition: 0.4s ease;
        }
        .progress-step {
            position: relative;
            text-align: center;
            width: 33.33%;
        }
        .progress-step .progress-marker {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 3px solid #e0e0e0;
            background-color: #fff;
            transition: 0.4s ease;
            margin: 0 auto 10px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: #e0e0e0;
        }
        .progress-step.complete .progress-marker {
            border-color: #0D6EFD;
            background-color: #0D6EFD;
            color: #fff;
        }
        .progress-text {
            font-size: 0.9rem;
            color: #666;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container">
            <a href="index.html" class="navbar-brand">
                <svg xmlns="http://www.w3.org/2000/svg" width="120" height="28" viewBox="0 0 120 28">
                    <style>.logo-font{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif,'Apple Color Emoji','Segoe UI Emoji','Segoe UI Symbol';font-size:24px;font-weight:bold;fill:white;}.logo-k{fill:#0D6EFD;}</style>
                    <text x="0" y="22" class="logo-font">MR <tspan class="logo-k">KICKS</tspan></text>
                </svg>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link d-flex align-items-center" href="index.html" aria-label="Home">
                            <i class="bi bi-house fs-5 me-1"></i>Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link d-flex align-items-center" href="cart.html" aria-label="Shopping Cart">
                            <span class="position-relative">
                                <i class="bi bi-cart fs-5"></i>
                                <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="cart-count">0</span>
                            </span><span class="ms-2">Cart</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <ul class="progress-container">
            <div class="progress-line" style="width: 100%;"></div>
            <li class="progress-step complete">
                <div class="progress-marker"><i class="bi bi-cart"></i></div>
                <div class="progress-text">Shopping Cart</div>
            </li>
            <li class="progress-step complete">
                <div class="progress-marker"><i class="bi bi-credit-card"></i></div>
                <div class="progress-text">Payment Details</div>
            </li>
            <li class="progress-step complete">
                <div class="progress-marker"><i class="bi bi-check-circle"></i></div>
                <div class="progress-text">Order Complete</div>
            </li>
        </ul>
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6 text-center">
                <div id="status-container">
                    <h2>Checking payment status...</h2>
                    <div class="spinner-border" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script src="https://js.stripe.com/v3/"></script>
<script>
    // Add your Stripe publishable key here
    const stripe = Stripe('pk_test_...your_publishable_key_here');

    document.addEventListener('DOMContentLoaded', async () => {
        document.getElementById('cart-count').textContent = '0'; // Cart is empty on success page
        const urlParams = new URLSearchParams(window.location.search);
        const clientSecret = urlParams.get('payment_intent_client_secret');
        const statusContainer = document.getElementById('status-container');

        if (!clientSecret) {
            statusContainer.innerHTML = '<h2>Error: Payment details not found.</h2>';
            return;
        }

        const { paymentIntent } = await stripe.retrievePaymentIntent(clientSecret);

        switch (paymentIntent.status) {
            case 'succeeded':
                localStorage.removeItem('cart'); // Clear the cart
                statusContainer.innerHTML = `
                    <h2 class="text-success">Payment Successful!</h2>
                    <p>Your Order ID: <strong>${paymentIntent.id}</strong></p>
                    <p>Thank you for your purchase.</p>
                    <a href="index.html" class="btn btn-primary">Continue Shopping</a>
                `;
                break;

            case 'processing':
                statusContainer.innerHTML = "<h2>Payment processing. We'll update you when payment is received.</h2>";
                break;

            case 'requires_payment_method':
                statusContainer.innerHTML = `
                    <h2 class="text-danger">Payment failed.</h2>
                    <p>Please try another payment method.</p>
                    <a href="Payments.html" class="btn btn-warning">Try Again</a>
                `;
                break;

            default:
                statusContainer.innerHTML = '<h2 class="text-danger">Something went wrong.</h2>';
                break;
        }
    });
</script>
</body>
</html>
